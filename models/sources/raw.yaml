          - name: user_email 
            description: User's email.
            tests: 
              - not_null 
          - name: plan_type_snapshot 
            description: User's plan type the moment they triggered the event.
            tests: 
              - not_null
          - name: device_type
            description: User's device when triggering event.
            tests: 
              - not_null
          - name: timestamp 
            tests:
              - not_null
          - name: organisation_id
            description: User's organisation id.
            tests:
              - not_null
          - name: session_id
            description: User's session id.
            tests:
              - not_null
          - name: loaded_at
            description: Last upload of data. 
            tests: 
              - not_null 
        
        loaded_at_field: loaded_at 
  
