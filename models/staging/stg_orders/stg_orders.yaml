version: 2

models: 
  - name: stg_orders
    description: This model transforms the raw order data into a structured format.
    columns:
      - name: order_id 
        description: Unique order identifier 
        tests: 
          - unique 
          - not_null 
      - name: customer_id 
        description: Customer's id. 
        tests: 
          - not_null 
      - name: order_date 
        description: Order's date 
        tests: 
          - not_null 
      - name: total_amount 
        description: Total amount of the order in USD
        tests: 
          - not_null
          - positive_total_amount
      - name: order_status 
        tests:
          - accepted_values:
              values: ['pending', 'shipped', 'delivered', 'canceled']
    
    loaded_at_field: loaded_at 

    freshness:
      warn_after: {count: 1, period: day}
      error_after: {count: 2, period: day}

