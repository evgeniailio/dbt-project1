            tests: 
              - not_null
          - name: timestamp 
            tests:
              - not_null
          - name: organisation_id
            description: User's organisation id.
            tests:
              - not_null
          - name: session_id
            description: User's session id.
            tests:
              - not_null
          - name: loaded_at
            description: Last upload of data. 
            tests: 
              - not_null 
        
        loaded_at_field: loaded_at 
  
        freshness:
          warn_after: {count: 1, period: day}
          error_after: {count: 2, period: day}

      - name: report_created
        description: User creates first report.
        columns:
